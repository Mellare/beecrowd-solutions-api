    <h1>Beecrowd 1146 Solution</h1>
    <pre>
        <code class="language-python">
while(True):
    x = int(input())
    if x &lt= 0:
        break
    else:
        for i in range(1, x):
            print(f"{i}".rstrip(), end=" ")
        print(x)
